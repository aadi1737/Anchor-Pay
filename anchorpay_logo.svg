<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AnchorPay logo with A-cube motif</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AnchorPay logo featuring a stylized anchor integrated with a 3D cube, representing A-cubed (A³)</desc>

  <defs>
    
  <mask id="imagine-text-gaps-aac17u" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="420" fill="white"/><rect x="216.53750610351562" y="240" width="248.0319366455078" height="64" fill="black" rx="2"/><rect x="506" y="246.40000915527344" width="15.8125" height="31.200000762939453" fill="black" rx="2"/><rect x="201.75" y="302" width="275.70001220703125" height="24" fill="black" rx="2"/><rect x="216.0437469482422" y="330.20001220703125" width="247.91250610351562" height="20" fill="black" rx="2"/><rect x="-13.043749809265137" y="-17.199999809265137" width="25.55999755859375" height="23.200000762939453" fill="black" rx="2"/></mask></defs>

  <!-- ───── ICON MARK ───── -->
