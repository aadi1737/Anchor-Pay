  <text x="576" y="376" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#F0EEE8" style="fill:rgb(240, 238, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">A³</text>

